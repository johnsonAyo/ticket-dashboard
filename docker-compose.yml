version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
      - "5173:5173"
    volumes:
      - ./data:/app/data
      # Mount source files so live reload works for dev (optional, but nice)
      - ./apps:/app/apps
      - ./packages:/app/packages
    environment:
      - PORT=3000
      - DATABASE_URL=file:/app/data/app.db
      - CORS_ORIGIN=http://localhost:5173
      # We use localhost for VITE_API_BASE_URL because the browser requests it from the host machine
      - VITE_API_BASE_URL=http://localhost:3000/api
